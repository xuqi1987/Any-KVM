[package]
edition = "2021"
name = "str0m"
version = "0.5.1"
authors = [
    "Martin Algesten <martin@algesten.se>",
    "Hugo Tunius <h@tunius.se>",
    "Davide Bertola <dade@dadeb.it>",
]
exclude = [
    "/cargo_deny.sh",
