# Cross.toml — 玩客云 (Amlogic S905L, ARMv8 64-bit) 交叉编译配置
# 用法: cross build --target aarch64-unknown-linux-gnu --release

[build.env]
# 允许访问宿主机的以下环境变量（ALSA/OpenH264 pkg-config 路径）
passthrough = [
    "PKG_CONFIG_PATH",
    "PKG_CONFIG_SYSROOT_DIR",
]

[target.aarch64-unknown-linux-gnu]
# 使用带 ALSA/V4L2/串口头文件的 cross 镜像
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:main"

# 挂载宿主 /dev/null 防止 openssl 探测本机设备
pre-build = [
    "dpkg --add-architecture arm64",
    "apt-get update -qq",
    "apt-get install -y --no-install-recommends libasound2-dev:arm64 libssl-dev:arm64",
]
