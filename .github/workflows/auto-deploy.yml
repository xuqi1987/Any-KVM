name: Auto Deploy

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      server_ip:
        description: '服务器 IP 地址（留空则使用 SECRET）'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  deploy:
    name: 自动部署到服务器
    runs-on: self-hosted

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装 sshpass
        run: DEBIAN_FRONTEND=noninteractive apt-get update && apt-get install -y sshpass

      - name: 部署服务
        env:
          SERVER_IP: ${{ github.event.inputs.server_ip || secrets.SERVER_IP }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no root@$SERVER_IP 'bash -s' << 'DEPLOY_SCRIPT'
          #!/bin/bash
          set -e

          echo "=========================================="
          echo "  Any-KVM 自动部署"
          echo "=========================================="

          # 安装/校验 Docker（更健壮）
          echo "→ 检查 Docker..."
          if ! command -v docker &> /dev/null; then
              echo "→ 安装 Docker（非交互模式）..."
              export DEBIAN_FRONTEND=noninteractive

              # 更新 apt 源
              apt-get update -qq

              # 分步骤安装 docker 相关包，添加 dpkg 选项以减少交互提示
              apt-get install -y -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold" \
                  docker.io curl git wget || {
                  echo "⚠ apt 安装 docker.io 失败，尝试使用官方安装脚本..." >&2
                  # 回退到官方安装脚本（更可靠）
                  curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
                  sh /tmp/get-docker.sh
                  rm -f /tmp/get-docker.sh
              }

              # 确保 Docker 服务已启动（允许重试）
              for i in 1 2 3; do
                  systemctl start docker && break || {
                      echo "尝试启动 docker (#$i)..." >&2
                      sleep 2
                  }
              done

              # 校验 docker 可用性
              if ! docker version &> /dev/null; then
                  echo "Error: Docker 安装或启动失败" >&2
                  # 打印最近日志供排错
                  journalctl -u docker -n 50 --no-pager || true
                  exit 1
              fi

              echo "✓ Docker 已安装并正在运行"

              # 安装 docker-compose（优先 apt，若无则下载二进制）
              if ! command -v docker-compose &> /dev/null; then
                  echo "→ 安装 docker-compose..."
                  if apt-get install -y docker-compose; then
                      echo "✓ docker-compose 已通过 apt 安装"
                  else
                      # 使用 GitHub Releases 下载 docker-compose v2.x 二进制到 /usr/local/bin
                      COMPOSE_VERSION="2.24.0"
                      curl -fsSL -o /usr/local/bin/docker-compose \
                        "https://github.com/docker/compose/releases/download/v${COMPOSE_VERSION}/docker-compose-$(uname -s)-$(uname -m)"
                      chmod +x /usr/local/bin/docker-compose || true
                      echo "✓ docker-compose 已下载到 /usr/local/bin/docker-compose"
                  fi
              fi
          else
              echo "✓ Docker 已存在"
              # 若 Docker 未运行则尝试启动
              if ! systemctl is-active --quiet docker; then
                  echo "→ 启动 Docker 服务..."
                  systemctl start docker || true
                  sleep 2
              fi
              # 校验 docker 可用性
              if ! docker version &> /dev/null; then
                  echo "Error: Docker 已存在但不可用" >&2
                  journalctl -u docker -n 50 --no-pager || true
                  exit 1
              fi
          fi

          # 以下为原有流程：克隆/更新项目、替换配置、启动容器等
          echo ""
          echo "→ 更新代码..."
          cd /root
          if [ -d "Any-KVM" ]; then
              cd Any-KVM && git pull && cd /root
              echo "✓ 代码已更新"
          else
              MAX_RETRIES=3
              RETRY_DELAY=5
              CLONE_TIMEOUT=300
              RETRY_COUNT=0
              CLONE_SUCCESS=0

              while [ $RETRY_COUNT -lt $MAX_RETRIES ] && [ $CLONE_SUCCESS -eq 0 ]; do
                  RETRY_COUNT=$((RETRY_COUNT + 1))
                  echo "尝试克隆代码 (第 ${RETRY_COUNT}/${MAX_RETRIES} 次)..."

                  if timeout $CLONE_TIMEOUT git clone --depth 1 https://github.com/xuqi1987/Any-KVM.git; then
                      CLONE_SUCCESS=1
                      echo "✓ 代码已克隆"
                  else
                      echo "⚠ 克隆失败，等待 ${RETRY_DELAY} 秒后重试..."
                      sleep $RETRY_DELAY
                  fi
              done

              if [ $CLONE_SUCCESS -eq 0 ]; then
                  echo "Error: 克隆代码失败，已重试 ${MAX_RETRIES} 次" >&2
                  exit 1
              fi
          fi

          echo ""
          echo "→ 配置服务..."
          cd /root/Any-KVM/deploy
          PUBLIC_IP=$(curl -s --max-time 10 ifconfig.me || curl -s --max-time 10 icanhazip.com || true)
          if [ -z "$PUBLIC_IP" ]; then
              echo "Error: 无法获取公网 IP 地址" >&2
              exit 1
          fi
          TURN_PASSWORD=$(openssl rand -base64 24 | tr -d "=+/" | cut -c1-20)

          if [ -f coturn.conf ]; then
              cp coturn.conf coturn.conf.bak
              echo "✓ 已备份 coturn.conf"
          fi

          sed -i "s/YOUR_PUBLIC_IP/$PUBLIC_IP/g" coturn.conf
          sed -i "s/CHANGE_ME_IN_PRODUCTION/$TURN_PASSWORD/g" coturn.conf

          echo "✓ 配置完成"

          echo ""
          echo "→ 启动容器..."
          docker-compose down 2>/dev/null || true
          docker-compose up -d

          sleep 10

          cat > /root/any-kvm-info.txt << EOF
          ╔══════════════════════════════════════════════════════╗
          ║           Any-KVM 部署成功！                          ║
          ╚══════════════════════════════════════════════════════╝

          部署时间: $(date '+%Y-%m-%d %H:%M:%S')
          服务器 IP: $PUBLIC_IP

          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
           🌐 Web 控制台
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          访问地址: http://$PUBLIC_IP:8080

          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
           🔐 TURN 认证信息（设备端需要）
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          TURN URL:  turn:$PUBLIC_IP:3478
          用户名:    kvmuser
          密码:      $TURN_PASSWORD

          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
           📱 设备端配置（/opt/any-kvm/config.toml）
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          [signal]
          url     = "ws://$PUBLIC_IP:8080/ws"
          room_id = "kvm-room-1"

          [ice]
          turn_url      = "turn:$PUBLIC_IP:3478"
          turn_username = "kvmuser"
          turn_password = "$TURN_PASSWORD"

          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
           🛡️ 阿里云安全组端口（必须开放）
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          8080/TCP       - 信令服务器 + Web UI
          3478/UDP       - STUN/TURN
          49152-49200/UDP - TURN Relay

          EOF

          echo ""
          echo "=========================================="
          echo "  ✅ 部署完成！"
          echo "=========================================="
          cat /root/any-kvm-info.txt

          echo ""
          docker-compose ps

          if curl -s --max-time 5 http://localhost:8080/health | grep -q "ok"; then
              echo "✓ 信令服务器运行正常"
          else
              echo "⚠ 信令服务器可能未就绪，请稍后访问"
          fi

          DEPLOY_SCRIPT

      - name: 获取部署信息
        env:
          SERVER_IP: ${{ github.event.inputs.server_ip || secrets.SERVER_IP }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          echo "## 🎉 部署成功！" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no root@$SERVER_IP 'cat /root/any-kvm-info.txt' >> $GITHUB_STEP_SUMMARY || echo "无法获取配置信息" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 下一步操作" >> $GITHUB_STEP_SUMMARY
          echo "1. ⚠️ **立即在阿里云控制台开放端口**（8080/TCP, 3478/UDP, 49152-49200/UDP）" >> $GITHUB_STEP_SUMMARY
          echo "2. 🌐 浏览器访问: http://${SERVER_IP}:8080" >> $GITHUB_STEP_SUMMARY
          echo "3. 📱 配置设备端 Agent（见上方配置信息）" >> $GITHUB_STEP_SUMMARY
          echo "4. 📄 完整配置已保存到服务器: /root/any-kvm-info.txt" >> $GITHUB_STEP_SUMMARY

      - name: 保存配置文件
        env:
          SERVER_IP: ${{ github.event.inputs.server_ip || secrets.SERVER_IP }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -p "$SSH_PASSWORD" scp -o StrictHostKeyChecking=no root@$SERVER_IP:/root/any-kvm-info.txt ./deployment-info.txt || true

      - name: 上传配置到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-config-${{ github.run_id }}
          path: deployment-info.txt
          retention-days: 30
