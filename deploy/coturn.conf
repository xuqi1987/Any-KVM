# coturn 配置文件 — Any-KVM 部署
# 适用于弱公网服务器（< 1 Mbps 带宽）
# 文档: https://github.com/coturn/coturn/wiki/turnserver

# ─── 网络配置 ──────────────────────────────────────────────────────────────────
# 替换为服务器的真实公网 IP 地址
external-ip=47.86.7.158/172.31.159.215

# STUN/TURN 监听端口
listening-port=3478

# TURN relay 端口范围（最小化开放，仅 50 个端口已足够 1 路会话）
min-port=49152
max-port=49200

# ─── 认证配置 ──────────────────────────────────────────────────────────────────
# 启用 TURN 认证，防止 TURN 被滥用
lt-cred-mech

# 替换为安全的用户名和密码
user=kvmuser:anykvm2026

# 服务域名（可设为 IP 或域名）
realm=any-kvm.local

# ─── 带宽限制（保护弱服务器）─────────────────────────────────────────────────
# 单个 TURN 会话最大带宽：480 kbps（视频 500k 以内保留余量）
max-bps=480000

# TURN 中继会话总数限制
total-quota=10

# ─── 安全配置 ──────────────────────────────────────────────────────────────────
# 只允许 UDP STUN/TURN（TCP TURN 备用）
# no-tcp-relay

# KVM 场景需要 TURN 中继到局域网设备，故仅禁止回环和链路本地地址
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255

# ─── 日志配置 ──────────────────────────────────────────────────────────────────
log-file=/var/log/coturn.log
verbose

# ─── 性能配置 ──────────────────────────────────────────────────────────────────
# 禁用 CLI 管理接口（减少资源占用）
no-cli

# 禁用 TLS（信令层用 WSS，TURN 使用标准 UDP 即可）
no-tls
no-dtls
